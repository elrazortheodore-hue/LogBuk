<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogDesk — Real-Time Logbook Digitization Platform</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-wrapper" style="flex-direction: column; gap: 2rem;">
  <div class="auth-card" style="max-width: 500px;">
    <div class="brand-header">
      <div class="brand-logo-container">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" />
          <polyline points="14 2 14 8 20 8" stroke="currentColor" />
          <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" />
          <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" />
        </svg>
      </div>
      <h2 class="brand-title">LogDesk</h2>
      <p class="brand-subtitle">Real-Time Logbook Digitization Platform</p>
    </div>

    <div style="display: flex; flex-direction: column; gap: 1rem; text-align: left; margin-top: 1rem;">
      <a href="/viewer" class="btn btn-primary" style="text-decoration: none; padding: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px; height:16px;">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
          <line x1="15" y1="3" x2="15" y2="21"></line>
          <line x1="3" y1="9" x2="21" y2="9"></line>
          <line x1="3" y1="15" x2="21" y2="15"></line>
        </svg>
        Launch Live Dashboard
      </a>

      <a href="/upload" class="btn btn-secondary" style="text-decoration: none; padding: 1rem; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px; height:16px;">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
        Launch Operator Console
      </a>
    </div>
  </div>
</body>
</html>
