<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogDesk — Real-Time Records Workspace</title>
  <link rel="stylesheet" href="/css/styles.css">
  
  <!-- Firebase Compat SDKs for robust Realtime Database listeners -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <!-- SheetJS library for direct client-side Excel exports -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <script src="/js/auth.js"></script>
  <script src="/js/excel.js"></script>
</head>
<body>

  <!-- Lock Screen Authentication View -->
  <div id="auth-container" class="auth-wrapper">
    <div class="auth-card">
      <div class="brand-header">
        <div class="brand-logo-container">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" />
            <polyline points="14 2 14 8 20 8" stroke="currentColor" />
            <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" />
            <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" />
          </svg>
        </div>
        <h2 class="brand-title">Live Records</h2>
        <p class="brand-subtitle">LogDesk Viewer Dashboard</p>
      </div>

      <form id="auth-form" onsubmit="handleAuthSubmit(event)">
        <div class="form-group">
          <label class="form-label" for="pin-input">Enter Viewer PIN</label>
          <input type="password" id="pin-input" class="pin-input-field" maxlength="4" placeholder="••••" required inputmode="numeric" pattern="[0-9]*">
        </div>
        <button type="submit" class="btn btn-primary" id="unlock-btn">
          Unlock Dashboard
        </button>
      </form>
      <div id="auth-error" class="error-message"></div>
    </div>
  </div>

  <!-- Main Viewer Dashboard Workspace -->
  <div id="app-container" class="app-container">
    <!-- Top Action Bar -->
    <header class="viewer-topbar">
      <div class="logo-section">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" />
          <polyline points="14 2 14 8 20 8" stroke="currentColor" />
          <line x1="16" y1="13" x2="8" y2="13" stroke="currentColor" />
          <line x1="16" y1="17" x2="8" y2="17" stroke="currentColor" />
        </svg>
        <h1>LogDesk</h1>
      </div>
      
      <div class="status-controls-section">
        <!-- Pulse connection indicator -->
        <div class="live-indicator disconnected" id="connection-indicator">
          <span class="indicator-dot"></span>
          <span id="connection-status-text">Disconnected</span>
        </div>
        
        <div class="action-buttons">
          <button class="btn btn-secondary" onclick="triggerExcelExport()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.25rem;">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            <span>Export</span>
          </button>
          
          <button class="btn btn-secondary" onclick="triggerReload()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.25rem;">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            <span>Refresh</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Workspace Toolbar -->
    <div class="workspace-toolbar">
      <div class="search-input-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="search-input" id="search-box" placeholder="Search records..." oninput="handleSearchFilter()">
      </div>
      <div style="flex-grow: 1;"></div>
      <div style="font-size: 0.75rem; color: var(--text-muted);">
        Double-click a cell to edit. Move with arrows. Copy (Ctrl+C) / Paste (Ctrl+V).
      </div>
    </div>

    <!-- Dynamic Spreadsheet Workspace -->
    <main class="workspace-canvas" id="workspace-canvas">
      <!-- Table will be rendered dynamically inside this layout wrapper -->
      <div class="spreadsheet-wrapper" id="table-wrapper">
        <div class="empty-placeholder" id="placeholder-view">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
            <line x1="15" y1="3" x2="15" y2="21"></line>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="3" y1="15" x2="21" y2="15"></line>
          </svg>
          <p class="empty-title">No Digitized Records</p>
          <p class="empty-subtitle">Upload a logbook page from a mobile device to begin real-time stream.</p>
        </div>
      </div>
    </main>

    <!-- Footer Bar -->
    <footer class="viewer-footer">
      <div>Status: <span id="footer-status-text">Idle</span></div>
      <div id="record-count-indicator">0 records loaded</div>
    </footer>
  </div>

  <script src="/js/viewer.js"></script>
</body>
</html>
